name: Expo Go Update

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3

      - name: 🏗 Setup cache
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('./frontend/package-lock.lock') }}

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm install
        shell: bash

      - name: 🏗  Setup EAS
        working-directory: ./frontend
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Update Expo Go
        working-directory: ./frontend
        run: eas update --auto
        shell: bash